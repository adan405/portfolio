<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" fill="none" role="img" aria-label="Abstract AI and technology illustration">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>
  <rect width="560" height="420" rx="24" fill="url(#bg)"/>
  <ellipse cx="420" cy="80" rx="120" ry="100" fill="url(#orb)" filter="url(#blur)" opacity="0.7"/>
  <ellipse cx="120" cy="320" rx="100" ry="80" fill="url(#orb)" filter="url(#blur)" opacity="0.5"/>
  <path d="M80 200 Q200 120 280 200 T480 180" stroke="url(#glow)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M100 280 Q240 200 380 260 T520 240" stroke="url(#glow)" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Nodes -->
  <g fill="#c4b5fd" opacity="0.9">
    <circle cx="140" cy="160" r="6"/>
    <circle cx="240" cy="120" r="5"/>
    <circle cx="340" cy="180" r="7"/>
    <circle cx="420" cy="140" r="5"/>
    <circle cx="200" cy="260" r="6"/>
    <circle cx="320" cy="240" r="5"/>
    <circle cx="400" cy="300" r="6"/>
  </g>
  <g stroke="#a78bfa" stroke-width="1.2" opacity="0.35">
    <line x1="140" y1="160" x2="240" y2="120"/>
    <line x1="240" y1="120" x2="340" y2="180"/>
    <line x1="340" y1="180" x2="420" y2="140"/>
    <line x1="200" y1="260" x2="320" y2="240"/>
    <line x1="320" y1="240" x2="400" y2="300"/>
    <line x1="140" y1="160" x2="200" y2="260"/>
  </g>
  <rect x="180" y="300" width="200" height="56" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(167,139,250,0.35)" stroke-width="1"/>
  <text x="280" y="335" text-anchor="middle" fill="#e9d5ff" font-family="system-ui,sans-serif" font-size="14" font-weight="600" opacity="0.85">Intelligent systems</text>
</svg>
